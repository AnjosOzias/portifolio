<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <section>
        <div id="calc">
        <h1>Calculadora</h1>
        <div id="display"><p>0</p></div>
        <div id="botoes">
        <button id="um" class="numero btn" data-num="1">1</button>
        <button class="numero btn" data-num="2">2</button>
        <button class="numero btn" data-num="3">3</button>
        <button class="numero btn" data-num="4">4</button>
        <button class="numero btn" data-num="5">5</button>
        <button class="numero btn" data-num="6">6</button>
        <button class="numero btn" data-num="7">7</button>
        <button class="numero btn" data-num="8">8</button>
        <button class="numero btn" data-num="9">9</button>
        <button class="numero btn" data-num="0">0</button>
        <button class="operador btn" data-op="+">+</button>
        <button class="operador btn" data-op="-">-</button>
        <button class="operador btn" data-op="*">*</button>
        <button class="operador btn" data-op="/">/</button>
        <button class="decimal btn" id="decimal" data-op="decimal">.</button>
        <button id="igual" class="igual btn" data-op="=">=</button>
        <button id="limpar" class="btn">Limpar</button>
        </div>


        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
